name: Claude Info Update

on:
  workflow_dispatch:
  schedule:
    # JST 07:00 = UTC 22:00（日報の JST 01:05 とは別の時間帯）
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: claude-info-main
  cancel-in-progress: true

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync latest main
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Collect Claude ecosystem info
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m scripts.claude_main

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add claude/ data/claude_seen_urls.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update claude ecosystem info"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Build static site
        run: |
          python -m scripts.build_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
