name: Daily AI News

on:
  workflow_dispatch:
  schedule:
    # JST 01:05 = UTC 16:05
    - cron: "5 16 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-ai-news-main
  cancel-in-progress: true

jobs:
  build-news-and-deploy:
    runs-on: ubuntu-latest
    # Batches API の完了待ち（最大20分）を見込んだ値
    timeout-minutes: 45

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # push 前の rebase に必要な直近履歴だけ取得する
          fetch-depth: 50

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync latest main
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Generate daily news markdown
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m scripts.main

      - name: Check day of week (JST)
        id: check-day
        run: |
          DOW=$(TZ=Asia/Tokyo date +%u)
          echo "day_of_week=$DOW" >> "$GITHUB_OUTPUT"
          if [ "$DOW" = "1" ]; then
            echo "is_monday=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_monday=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate model report (weekly, Monday only)
        if: steps.check-day.outputs.is_monday == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m scripts.model_report

      - name: Generate weekly report (Monday only)
        if: steps.check-day.outputs.is_monday == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m scripts.weekly_report

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news/ index.md data/seen_urls.json data/metrics.json
          # model_report が実行された場合は models/ も含める
          if [ "${{ steps.check-day.outputs.is_monday }}" = "true" ]; then
            git add models/
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily ai news update"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      # 健全性警告を Issue で管理する（警告あり: 作成/更新、警告なし: 自動クローズ）
      - name: Check pipeline health and manage issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.metrics --check > /tmp/health.txt || true
          gh label create ai-news-health --force --description "パイプライン健全性チェックの警告" --color D93F0B 2>/dev/null || true

          EXISTING=$(gh issue list --label ai-news-health --state open --json number --jq '.[0].number // empty')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -s /tmp/health.txt ]; then
            BODY=$(printf '健全性チェックの警告が検出されました。\n\n```\n%s\n```\n\n最終確認: %s\n[workflow run](%s)\n\n警告が解消されると自動でクローズされます。' \
              "$(cat /tmp/health.txt)" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$RUN_URL")
            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --body "$BODY"
              echo "updated health issue #$EXISTING"
            else
              gh issue create --title "健全性チェック警告: 収集品質に問題があります" \
                --label ai-news-health --body "$BODY"
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "警告が解消されたため自動クローズします。"
          fi

      - name: Build static site
        run: |
          python -m scripts.build_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ワークフロー失敗時に Issue で通知する（既存の失敗 Issue があればコメント追記）
      - name: Report workflow failure as issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create pipeline-failure --force --description "パイプライン実行の失敗" --color B60205 2>/dev/null || true
          EXISTING=$(gh issue list --label pipeline-failure --state open --json number --jq '.[0].number // empty')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "再失敗: ${{ github.workflow }} — $RUN_URL"
          else
            gh issue create --title "パイプライン失敗: ${{ github.workflow }}" \
              --label pipeline-failure \
              --body "ワークフローが失敗しました。ログ: $RUN_URL"
          fi